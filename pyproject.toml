[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",   # line too long — handled by formatter
    "E402",   # module level import not at top of file — needed for sys.path hacks in tests
    "F841",   # local variable assigned but never used — sometimes intentional in tests
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]
